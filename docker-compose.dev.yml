# Local development infrastructure (Postgres + Redis only).
# Run app/backend/frontend on the host with `pnpm dev`.
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: zahira_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zahira}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zahira_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-zahira}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - zahira_pgdata_dev:/var/lib/postgresql/data
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zahira}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: zahira_redis_dev
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - zahira_redisdata_dev:/data

volumes:
  zahira_pgdata_dev:
  zahira_redisdata_dev:
